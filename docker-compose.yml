version: '3.8'

services:
  mongodb:
    image: mongo:latest
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    restart: unless-stopped
    build: ./server
    ports:
      - "5001:5001"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/tiffin-service
      - PORT=5001
    depends_on:
      - mongodb

  client:
    build: ./client
    ports:
      - "8081:80"
    restart: unless-stopped
    depends_on:
      - server

volumes:
  mongo-data:
